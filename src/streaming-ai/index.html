<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>typetype AI 整理</title>
    <link rel="stylesheet" href="../shared/base.css" />
  </head>
  <body class="streaming-ai-shell">
    <main class="streaming-ai-layout">
      <header class="streaming-ai-header">
        <div>
          <p class="settings-kicker">流式 AI 整理</p>
          <h1>AI 修正原文与整理稿</h1>
        </div>
        <div class="streaming-ai-actions">
          <label class="streaming-ai-template">
            <span>本次模板</span>
            <select id="streaming-scenario-select">
              <optgroup label="常用润写">
                <option value="general">通用整理</option>
                <option value="meeting_notes">会议纪要</option>
                <option value="work_report">工作汇报</option>
                <option value="message_reply">邮件/微信回复</option>
                <option value="todo_list">待办清单</option>
                <option value="study_notes">学习笔记</option>
                <option value="customer_service">客服记录</option>
              </optgroup>
              <optgroup label="党政机关公文">
                <option value="official_resolution">决议</option>
                <option value="official_decision">决定</option>
                <option value="official_order">命令（令）</option>
                <option value="official_communique">公报</option>
                <option value="official_announcement">公告</option>
                <option value="official_public_notice">通告</option>
                <option value="official_opinion">意见</option>
                <option value="official_notice">通知</option>
                <option value="official_circular">通报</option>
                <option value="official_report">报告</option>
                <option value="official_request">请示</option>
                <option value="official_reply">批复</option>
                <option value="official_proposal">议案</option>
                <option value="official_letter">函</option>
                <option value="official_minutes">纪要</option>
              </optgroup>
              <optgroup label="公司/白领常用">
                <option value="business_notice">公司通知</option>
                <option value="business_plan">工作计划</option>
                <option value="business_summary">工作总结</option>
                <option value="business_proposal">工作方案</option>
                <option value="business_email">商务邮件/微信</option>
                <option value="business_memo">备忘录</option>
                <option value="business_application">申请/审批说明</option>
                <option value="business_meeting_minutes">企业会议纪要</option>
              </optgroup>
              <optgroup label="学生/校园常用">
                <option value="student_leave_note">请假条</option>
                <option value="student_report">实习/实践报告</option>
                <option value="student_activity_plan">活动策划</option>
                <option value="student_speech">演讲稿</option>
                <option value="student_review">学习总结</option>
              </optgroup>
            </select>
          </label>
          <button type="button" class="settings-secondary-button" id="copy-raw-button">复制原文</button>
          <button type="button" class="settings-secondary-button" id="copy-ai-button">复制整理稿</button>
          <button type="button" class="settings-secondary-button" id="clear-button">清空本次记录</button>
        </div>
      </header>

      <section class="streaming-ai-status" data-tone="" id="status-card">
        <strong id="status-title">等待录音</strong>
        <span id="status-text">开启流式输出并打开“流式 AI 整理面板”后，这里会显示实时状态。</span>
        <em id="status-meta"></em>
      </section>

      <section class="streaming-ai-columns">
        <article class="streaming-ai-pane">
          <div class="streaming-ai-pane-heading">
            <h2>AI 修正原文</h2>
            <div class="streaming-ai-inline-actions">
              <span id="raw-count">0 字</span>
              <button type="button" class="settings-secondary-button" id="apply-refined-raw-button">一键带入</button>
            </div>
          </div>
          <pre id="raw-text" class="streaming-ai-text empty">等待 AI 修正原文…</pre>
        </article>

        <article class="streaming-ai-pane">
          <div class="streaming-ai-pane-heading">
            <h2>AI 纠错 / 会议纪要草稿</h2>
            <div class="streaming-ai-inline-actions">
              <span id="ai-count">0 字</span>
              <button type="button" class="settings-secondary-button" id="apply-ai-button">一键带入整理稿</button>
            </div>
          </div>
          <pre id="ai-text" class="streaming-ai-text empty">检测到停顿后，会在这里生成纠错稿或会议纪要草稿。</pre>
        </article>
      </section>
    </main>

    <script>
      (() => {
        const electronAPI = window.electronAPI;
        const statusCard = document.querySelector("#status-card");
        const statusTitle = document.querySelector("#status-title");
        const statusText = document.querySelector("#status-text");
        const statusMeta = document.querySelector("#status-meta");
        const rawText = document.querySelector("#raw-text");
        const aiText = document.querySelector("#ai-text");
        const rawCount = document.querySelector("#raw-count");
        const aiCount = document.querySelector("#ai-count");
        const scenarioSelect = document.querySelector("#streaming-scenario-select");
        const copyRawButton = document.querySelector("#copy-raw-button");
        const copyAiButton = document.querySelector("#copy-ai-button");
        const clearButton = document.querySelector("#clear-button");
        const applyRefinedRawButton = document.querySelector("#apply-refined-raw-button");
        const applyAiButton = document.querySelector("#apply-ai-button");

        function statusTitleFor(status) {
          switch (status) {
            case "recording":
              return "正在记录";
            case "thinking":
              return "AI 整理中";
            case "ready":
              return "整理稿已更新";
            case "error":
              return "AI 整理不可用";
            default:
              return "等待录音";
          }
        }

        function toneFor(status) {
          if (status === "error") return "error";
          if (status === "ready" || status === "recording") return "success";
          if (status === "thinking") return "thinking";
          return "";
        }

        function renderText(element, value, placeholder) {
          const text = value?.trim() ? value : placeholder;
          element.textContent = text;
          element.classList.toggle("empty", !value?.trim());
        }

        function cleanStatusText(value) {
          const text = value?.trim() || "等待录音。";
          if (/ONNX\s*Runtime|onnxruntime|Visual C\+\+|系统运行库|app\.asar|node_modules|The operating system cannot run %1/i.test(text)) {
            return "本地断句增强暂不可用，已使用基础断句；可在设置页修复系统运行库。";
          }
          return text;
        }

        function render(state) {
          statusCard.dataset.tone = toneFor(state.status);
          statusTitle.textContent = statusTitleFor(state.status);
          statusText.textContent = cleanStatusText(state.status_text);
          const reviewText = state.last_review_at
            ? `最近整理：${new Date(state.last_review_at).toLocaleTimeString()}`
            : "尚未整理";
          const applyText = state.apply_status_text ? ` · ${state.apply_status_text}` : "";
          statusMeta.textContent = `${state.mode_label || "流式模式"} · ${state.rewrite_scenario_label || "通用整理"} · ${state.ai_status_label || "等待"} · ${reviewText}${applyText}`;

          const refinedRaw = state.refined_raw_text?.trim() ? state.refined_raw_text : state.raw_text;
          renderText(rawText, refinedRaw, "等待 AI 修正原文…");
          renderText(aiText, state.ai_text, "检测到停顿后，会在这里生成纠错稿或会议纪要草稿。");
          if (scenarioSelect && state.rewrite_scenario && scenarioSelect.value !== state.rewrite_scenario) {
            scenarioSelect.value = state.rewrite_scenario;
          }
          rawCount.textContent = `${refinedRaw?.length ?? 0} 字`;
          aiCount.textContent = `${state.ai_text?.length ?? 0} 字`;
          copyRawButton.disabled = !(refinedRaw?.trim());
          copyAiButton.disabled = !(state.ai_text?.trim());
          clearButton.disabled = !(refinedRaw?.trim() || state.ai_text?.trim());
          applyRefinedRawButton.disabled = !(state.can_apply_refined_raw && refinedRaw?.trim());
          applyAiButton.disabled = !(state.ai_text?.trim());
        }

        function renderDisconnected(message) {
          statusCard.dataset.tone = "error";
          statusTitle.textContent = "面板未连接";
          statusText.textContent = message;
          statusMeta.textContent = "请关闭面板后重新打开，或重启 typetype。";
        }

        async function callAndRender(action) {
          try {
            const state = await action();
            render(state);
          } catch (error) {
            renderDisconnected(error instanceof Error ? error.message : String(error));
          }
        }

        if (!electronAPI) {
          renderDisconnected("没有连接到 typetype 主进程，面板无法接收实时原文。");
          return;
        }

        copyRawButton.addEventListener("click", () => {
          void callAndRender(() => electronAPI.copyStreamingAiRaw());
        });

        copyAiButton.addEventListener("click", () => {
          void callAndRender(() => electronAPI.copyStreamingAiSummary());
        });

        applyRefinedRawButton.addEventListener("click", () => {
          void callAndRender(() => electronAPI.applyStreamingAiRefinedRaw());
        });

        applyAiButton.addEventListener("click", () => {
          void callAndRender(() => electronAPI.applyStreamingAiSummary());
        });

        scenarioSelect.addEventListener("change", () => {
          void callAndRender(() => electronAPI.setStreamingAiScenario(scenarioSelect.value));
        });

        clearButton.addEventListener("click", () => {
          void callAndRender(() => electronAPI.clearStreamingAiPanel());
        });

        electronAPI.subscribeStreamingAiPanelState(render);

        window.setInterval(() => {
          void electronAPI.getStreamingAiPanelState()
            .then(render)
            .catch((error) => {
              renderDisconnected(error instanceof Error ? error.message : String(error));
            });
        }, 1000);
      })();
    </script>
  </body>
</html>
